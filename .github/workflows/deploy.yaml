name: Deploy with Hugo
 
on:
  push:
    branches:
      - main
 
jobs:
  build-deploy:
    # runs-on: self-hosted
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
        fetch-depth: 0

    - name: Setup
      uses: peaceiris/actions-hugo@v2
      with:
        hugo_version: 'latest'

    - name: Build
      run: hugo --minify

    - name: Deploy Github
      uses: peaceiris/actions-gh-pages@v4
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        external_repository: m1doslo/m1doslo.github.io
        # cname: www.m1dsolo.xyz
